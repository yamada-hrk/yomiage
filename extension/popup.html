<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>小説読み上げ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: bold;
      color: #e0e0e0;
    }

    .content {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      background: #16213e;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #4ade80; }
    .status-dot.disconnected { background: #f87171; }
    .status-dot.checking { background: #facc15; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .section-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 6px 8px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    select:focus {
      border-color: #4f8ef7;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .speed-row input[type="range"] {
      flex: 1;
      accent-color: #4f8ef7;
      height: 4px;
    }

    .speed-value {
      font-size: 12px;
      color: #4f8ef7;
      width: 32px;
      text-align: right;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 6px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:active:not(:disabled) {
      transform: scale(0.96);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #btn-play {
      background: #4f8ef7;
      color: white;
    }

    #btn-pause {
      background: #f59e0b;
      color: white;
    }

    #btn-stop {
      background: #ef4444;
      color: white;
    }

    .progress-area {
      background: #16213e;
      border-radius: 6px;
      padding: 8px 10px;
      min-height: 40px;
    }

    .progress-text {
      font-size: 12px;
      color: #aaa;
    }

    .progress-text.reading {
      color: #4f8ef7;
    }

    .progress-text.paused {
      color: #f59e0b;
    }

    .progress-text.done {
      color: #4ade80;
    }

    .progress-text.error {
      color: #f87171;
    }

    .progress-bar-outer {
      margin-top: 6px;
      height: 4px;
      background: #0f3460;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: #4f8ef7;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .not-supported {
      text-align: center;
      color: #888;
      font-size: 12px;
      padding: 8px 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-row input[type="checkbox"] {
      accent-color: #4f8ef7;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .toggle-row label {
      cursor: pointer;
      font-size: 12px;
      color: #ccc;
      user-select: none;
    }

    .delay-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 22px;
      font-size: 12px;
      color: #888;
    }

    .delay-row select {
      width: auto;
      padding: 3px 6px;
    }

    .host-row {
      display: flex;
      gap: 6px;
    }

    .host-row input[type="text"] {
      flex: 1;
      padding: 6px 8px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }

    .host-row input[type="text"]:focus {
      border-color: #4f8ef7;
    }

    .btn-sm {
      flex-shrink: 0;
      padding: 6px 10px;
      background: #0f3460;
      color: #e0e0e0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-sm:hover { background: #1a4a8a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📖 小説読み上げ</h1>
  </div>

  <div class="content">
    <!-- VOICEVOXホスト -->
    <div>
      <div class="section-label">VOICEVOXホスト</div>
      <div class="host-row">
        <input type="text" id="voicevox-host" placeholder="localhost:50021" list="host-history-list">
        <datalist id="host-history-list"></datalist>
        <button class="btn-sm" id="btn-reconnect">接続</button>
      </div>
    </div>

    <!-- VOICEVOX接続状態 -->
    <div class="status-bar">
      <span class="status-dot checking" id="status-dot"></span>
      <span id="status-text">VOICEVOX接続確認中...</span>
    </div>

    <!-- スピーカー選択 -->
    <div>
      <div class="section-label">スピーカー</div>
      <select id="speaker-select" disabled>
        <option value="">接続待ち...</option>
      </select>
    </div>

    <!-- 読み上げ速度 -->
    <div>
      <div class="section-label">読み上げ速度</div>
      <div class="speed-row">
        <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.0">
        <span class="speed-value" id="speed-value">1.0x</span>
      </div>
    </div>

    <!-- 先読み数 -->
    <div>
      <div class="section-label">先読み段落数</div>
      <select id="prefetch-count">
        <option value="0">0（先読みなし）</option>
        <option value="1">1段落先</option>
        <option value="2" selected>2段落先</option>
        <option value="3">3段落先</option>
        <option value="4">4段落先</option>
        <option value="5">5段落先</option>
      </select>
    </div>

    <!-- 自動次ページ -->
    <div style="display:flex; flex-direction:column; gap:4px;">
      <div class="toggle-row">
        <input type="checkbox" id="auto-next">
        <label for="auto-next">読み終わったら次のページへ</label>
      </div>
      <div class="delay-row" id="delay-row" style="display:none">
        <span>遷移まで</span>
        <select id="auto-next-delay">
          <option value="3">3秒</option>
          <option value="5" selected>5秒</option>
          <option value="10">10秒</option>
        </select>
      </div>
    </div>

    <!-- 操作ボタン -->
    <div class="controls">
      <button id="btn-play" disabled>▶ 再生</button>
      <button id="btn-pause" disabled>⏸ 停止</button>
      <button id="btn-stop" disabled>⏹ リセット</button>
    </div>

    <!-- 進捗表示 -->
    <div class="progress-area">
      <div class="progress-text" id="progress-text">読み上げを開始するには「再生」を押してください</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
    </div>

    <!-- 非対応ページ警告 -->
    <div class="not-supported" id="not-supported" style="display:none">
      このページは対応していません。<br>
      小説家になろう・カクヨムの小説ページで使用してください。
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
