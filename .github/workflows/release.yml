name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: zip extension
        run: zip -r extension.zip extension/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
